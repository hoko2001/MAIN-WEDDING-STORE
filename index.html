<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusGames — Free PC Games Hub</title>
  <meta name="description" content="NexusGames is your ultimate hub for free PC game downloads. Find repacks, DRM-free games, Steam unlocked, and more from the best sites." />
  <meta name="keywords" content="free pc games, game repacks, drm-free games, fitgirl repacks, steamunlocked, free game downloads" />
  <meta property="og:title" content="NexusGames — Free PC Games Hub" />
  <meta property="og:description" content="Your ultimate hub for free PC game downloads — repacks, DRM-free, and more." />
  <meta property="og:type" content="website" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- React + Babel CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ===== RESET & ROOT ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:    #00f5ff;
      --pink:    #ff00a0;
      --green:   #39ff14;
      --yellow:  #ffe600;
      --bg:      #050810;
      --bg2:     #080d1a;
      --bg3:     #0d1528;
      --border:  rgba(0,245,255,0.18);
      --border2: rgba(255,0,160,0.22);
      --text:    #c8d8e8;
      --text2:   #7a9ab8;
      --glow-c:  0 0 8px rgba(0,245,255,0.7), 0 0 24px rgba(0,245,255,0.3);
      --glow-p:  0 0 8px rgba(255,0,160,0.7), 0 0 24px rgba(255,0,160,0.3);
      --glow-g:  0 0 8px rgba(57,255,20,0.7),  0 0 24px rgba(57,255,20,0.3);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: default;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 3px; }

    /* ===== ANIMATED GRID BACKGROUND ===== */
    #grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* Vignette overlay */
    #grid-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(5,8,16,0.85) 100%);
    }

    /* ===== SCANLINES ===== */
    #scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      animation: scanPan 8s linear infinite;
    }
    @keyframes scanPan {
      0%   { background-position: 0 0; }
      100% { background-position: 0 200px; }
    }

    /* ===== LAYOUT WRAPPER ===== */
    #root { position: relative; z-index: 2; }

    .page-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ===== TOP BANNER AD ===== */
    .top-banner-ad {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      padding: 8px 0; min-height: 66px;
    }
    .ad-slot {
      background: linear-gradient(135deg, rgba(0,245,255,0.04), rgba(255,0,160,0.04));
      border: 1px dashed rgba(0,245,255,0.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--text2); font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      position: relative; overflow: hidden;
    }
    .ad-slot::before {
      content: 'ADVERTISEMENT';
      position: absolute; top: 4px; left: 8px;
      font-size: 9px; color: rgba(0,245,255,0.3); letter-spacing: 2px;
    }
    .ad-banner-728 { width: 728px; height: 90px; max-width: 100%; }
    .ad-sky        { width: 160px; height: 600px; }
    .ad-sq         { width: 150px; height: 150px; }
    .ad-mid        { width: 468px; height: 60px; max-width: 100%; }

    /* ===== HEADER ===== */
    header {
      background: rgba(5,8,16,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      padding: 0 16px;
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; gap: 16px;
      height: 68px;
    }

    /* LOGO */
    .logo {
      font-family: 'Orbitron', monospace;
      font-weight: 900; font-size: 1.5rem;
      letter-spacing: 2px; white-space: nowrap;
      text-decoration: none;
      position: relative; overflow: hidden;
      animation: glitchLogo 5s infinite;
      cursor: pointer;
    }
    .logo span.nx { color: var(--cyan); text-shadow: var(--glow-c); }
    .logo span.gm { color: var(--pink); text-shadow: var(--glow-p); }

    @keyframes glitchLogo {
      0%, 89%, 100% { transform: none; filter: none; }
      90% { transform: skew(-2deg); filter: hue-rotate(90deg); }
      91% { transform: skew(0deg) translateX(3px); }
      92% { transform: none; filter: none; }
      93% { transform: translateX(-3px); filter: brightness(1.5); }
      94% { transform: none; filter: none; }
    }
    .logo::after {
      content: attr(data-text);
      position: absolute; inset: 0;
      color: var(--pink); opacity: 0;
      clip-path: inset(40% 0 50% 0);
      animation: glitchClip 5s infinite;
    }
    @keyframes glitchClip {
      0%, 89%, 100% { opacity: 0; }
      90% { opacity: 0.6; transform: translateX(-4px); clip-path: inset(20% 0 60% 0); }
      91% { opacity: 0; }
      92% { opacity: 0.4; transform: translateX(4px); clip-path: inset(60% 0 20% 0); }
      93% { opacity: 0; }
    }

    /* SEARCH */
    .search-wrap {
      flex: 1; max-width: 420px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: rgba(0,245,255,0.05);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 40px 8px 14px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input::placeholder { color: var(--text2); }
    .search-wrap input:focus {
      border-color: var(--cyan);
      box-shadow: var(--glow-c);
    }
    .search-icon {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text2); font-size: 14px; pointer-events: none;
    }

    /* HEADER ACTIONS */
    .header-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }

    .btn {
      font-family: 'Orbitron', monospace;
      font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 7px 14px; border-radius: 3px;
      border: none; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn-kofi {
      background: linear-gradient(135deg, #ff5e5b, #ff8c42);
      color: #fff;
      box-shadow: 0 0 12px rgba(255,94,91,0.4);
    }
    .btn-kofi:hover { transform: translateY(-1px); box-shadow: 0 0 20px rgba(255,94,91,0.7); }

    .btn-patreon {
      background: linear-gradient(135deg, #ff424d, #f96854);
      color: #fff;
      box-shadow: 0 0 12px rgba(249,104,84,0.4);
    }
    .btn-patreon:hover { transform: translateY(-1px); box-shadow: 0 0 20px rgba(249,104,84,0.7); }

    /* ===== CATEGORY NAV ===== */
    .cat-nav {
      background: rgba(8,13,26,0.95);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      position: sticky; top: 68px; z-index: 99;
    }
    .cat-nav-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; gap: 0; overflow-x: auto;
      scrollbar-width: none;
    }
    .cat-nav-inner::-webkit-scrollbar { display: none; }

    .cat-btn {
      font-family: 'Orbitron', monospace;
      font-size: 11px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 14px 20px; border: none; background: none;
      color: var(--text2); cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap; transition: all 0.2s;
      position: relative;
    }
    .cat-btn:hover  { color: var(--cyan); }
    .cat-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); text-shadow: var(--glow-c); }

    .cat-count {
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(0,245,255,0.15); border-radius: 20px;
      padding: 1px 6px; font-size: 9px; margin-left: 4px;
      color: var(--cyan);
    }

    /* ===== MAIN LAYOUT ===== */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 24px;
      max-width: 1400px; margin: 0 auto;
      padding: 24px 16px;
    }
    @media (max-width: 960px) {
      .main-layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    /* ===== SECTION HEADERS ===== */
    .section-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 18px;
    }
    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: 14px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--cyan);
    }
    .section-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--cyan), transparent);
      opacity: 0.4;
    }
    .section-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--text2);
      border: 1px solid var(--border); padding: 2px 8px;
      letter-spacing: 1px;
    }

    /* ===== FEATURED SECTION ===== */
    .featured-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 36px;
    }

    .featured-card {
      background: linear-gradient(135deg, rgba(13,21,40,0.9), rgba(8,13,26,0.9));
      border: 1px solid var(--border);
      border-radius: 6px; padding: 20px;
      position: relative; overflow: hidden;
      cursor: pointer; text-decoration: none;
      display: block;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .featured-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--pink));
    }
    .featured-card:hover {
      transform: translateY(-3px);
      border-color: rgba(0,245,255,0.5);
      box-shadow: 0 8px 32px rgba(0,245,255,0.15);
    }

    .fc-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 3px 8px; border-radius: 2px;
      margin-bottom: 12px;
    }
    .badge-top    { background: rgba(255,230,0,0.15); color: var(--yellow); border: 1px solid rgba(255,230,0,0.3); }
    .badge-safe   { background: rgba(57,255,20,0.1);  color: var(--green);  border: 1px solid rgba(57,255,20,0.3); }
    .badge-fast   { background: rgba(0,245,255,0.1);  color: var(--cyan);   border: 1px solid var(--border); }
    .badge-hot    { background: rgba(255,0,160,0.1);  color: var(--pink);   border: 1px solid var(--border2); }

    .fc-name {
      font-family: 'Orbitron', monospace;
      font-size: 15px; font-weight: 700;
      color: #fff; margin-bottom: 6px;
    }
    .fc-desc {
      font-size: 13px; color: var(--text2);
      line-height: 1.5; margin-bottom: 14px;
    }
    .fc-meta {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
    }
    .fc-tag {
      background: rgba(0,245,255,0.08);
      border: 1px solid var(--border); padding: 2px 7px;
      color: var(--cyan); border-radius: 2px;
    }
    .fc-visit {
      margin-left: auto; color: var(--pink); font-size: 11px;
      letter-spacing: 1px;
    }
    .fc-corner {
      position: absolute; bottom: 0; right: 0;
      width: 60px; height: 60px; pointer-events: none; opacity: 0.06;
      background: conic-gradient(from 0deg, var(--cyan), var(--pink));
      border-radius: 50% 0 0 0;
    }

    /* ===== SITES GRID ===== */
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 36px;
    }

    .site-card {
      background: rgba(8,13,26,0.85);
      border: 1px solid rgba(0,245,255,0.1);
      border-radius: 5px; padding: 16px;
      cursor: pointer; text-decoration: none;
      display: block; position: relative; overflow: hidden;
      transition: all 0.2s;
    }
    .site-card::after {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .site-card:hover {
      border-color: rgba(0,245,255,0.35);
      background: rgba(0,245,255,0.04);
      transform: translateY(-2px);
    }
    .site-card:hover::after { opacity: 1; }

    .sc-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .sc-icon {
      width: 36px; height: 36px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; margin-bottom: 10px;
    }
    .sc-name {
      font-family: 'Orbitron', monospace;
      font-size: 12px; font-weight: 700; color: #e8f0f8;
      margin-bottom: 5px; letter-spacing: 0.5px;
    }
    .sc-desc { font-size: 12px; color: var(--text2); line-height: 1.4; margin-bottom: 10px; }
    .sc-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .sc-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
      padding: 2px 6px; border-radius: 2px;
    }
    .tag-repack { background: rgba(255,0,160,0.12); color: var(--pink); border: 1px solid rgba(255,0,160,0.25); }
    .tag-drm    { background: rgba(57,255,20,0.08);  color: var(--green); border: 1px solid rgba(57,255,20,0.2); }
    .tag-steam  { background: rgba(0,245,255,0.08);  color: var(--cyan);  border: 1px solid var(--border); }
    .tag-crack  { background: rgba(255,230,0,0.08);  color: var(--yellow); border: 1px solid rgba(255,230,0,0.2); }
    .tag-gen    { background: rgba(180,180,255,0.08); color: #aaa8ff;      border: 1px solid rgba(180,180,255,0.2); }

    .sc-arrow {
      font-size: 16px; color: var(--text2);
      transition: color 0.2s, transform 0.2s;
    }
    .site-card:hover .sc-arrow { color: var(--cyan); transform: translateX(3px); }

    /* ===== NEWS SECTION ===== */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      margin-bottom: 36px;
    }

    .news-card {
      background: rgba(8,13,26,0.85);
      border: 1px solid rgba(0,245,255,0.1);
      border-radius: 5px; padding: 18px;
      position: relative; overflow: hidden;
      transition: all 0.2s; cursor: pointer;
    }
    .news-card:hover {
      border-color: rgba(255,0,160,0.35);
      background: rgba(255,0,160,0.03);
    }
    .news-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(180deg, var(--pink), transparent);
    }

    .nc-cat {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--pink); margin-bottom: 8px;
    }
    .nc-title {
      font-family: 'Orbitron', monospace;
      font-size: 12px; font-weight: 700; color: #e8f0f8;
      margin-bottom: 8px; line-height: 1.4;
    }
    .nc-body { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 12px; }
    .nc-foot {
      display: flex; align-items: center; justify-content: space-between;
      font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text2);
    }
    .nc-date { display: flex; align-items: center; gap: 4px; }
    .nc-read { color: var(--cyan); letter-spacing: 1px; }

    /* ===== AD MID-CONTENT ===== */
    .mid-ad-wrap {
      display: flex; justify-content: center;
      margin-bottom: 32px; padding: 12px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      display: flex; flex-direction: column; gap: 20px;
    }

    .sidebar-widget {
      background: rgba(8,13,26,0.9);
      border: 1px solid var(--border);
      border-radius: 5px; overflow: hidden;
    }
    .sw-header {
      background: linear-gradient(90deg, rgba(0,245,255,0.1), transparent);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      font-family: 'Orbitron', monospace;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--cyan);
    }
    .sw-body { padding: 14px; }

    /* Stats widget */
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid rgba(0,245,255,0.06);
      font-size: 12px;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--text2); font-family: 'Share Tech Mono', monospace; font-size: 11px; }
    .stat-val { color: var(--cyan); font-family: 'Share Tech Mono', monospace; font-weight: 700; font-size: 12px; }

    /* Online counter pulse */
    .online-dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--green);
      box-shadow: var(--glow-g); margin-right: 5px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Top pick */
    .top-pick {
      display: flex; flex-direction: column; gap: 8px;
    }
    .tp-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 3px;
      background: rgba(0,245,255,0.03);
      border: 1px solid rgba(0,245,255,0.07);
      font-size: 12px; cursor: pointer;
      transition: all 0.15s;
      text-decoration: none; color: var(--text);
    }
    .tp-item:hover { border-color: var(--border); background: rgba(0,245,255,0.07); }
    .tp-rank { font-family: 'Share Tech Mono', monospace; color: var(--text2); font-size: 10px; width: 16px; }
    .tp-name { flex: 1; font-size: 11px; }
    .tp-arrow { color: var(--text2); font-size: 10px; }

    /* ===== SEARCH RESULTS ===== */
    .search-results-banner {
      background: rgba(0,245,255,0.06);
      border: 1px solid var(--border);
      border-radius: 5px; padding: 12px 18px;
      margin-bottom: 20px;
      font-family: 'Share Tech Mono', monospace; font-size: 13px;
      color: var(--cyan);
      display: flex; align-items: center; gap: 10px;
    }
    .search-results-banner button {
      margin-left: auto; background: none; border: 1px solid var(--border);
      color: var(--text2); padding: 3px 10px; cursor: pointer;
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      border-radius: 2px; transition: all 0.15s;
    }
    .search-results-banner button:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ===== FOOTER ===== */
    footer {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      margin-top: 40px;
      padding: 40px 16px 24px;
    }
    .footer-inner {
      max-width: 1400px; margin: 0 auto;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 32px; margin-bottom: 32px;
    }
    @media (max-width: 768px) {
      .footer-grid { grid-template-columns: 1fr 1fr; }
    }

    .footer-logo {
      font-family: 'Orbitron', monospace; font-weight: 900;
      font-size: 1.3rem; letter-spacing: 2px; margin-bottom: 12px;
    }
    .footer-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }

    .footer-col h4 {
      font-family: 'Orbitron', monospace;
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--cyan); margin-bottom: 14px;
    }
    .footer-links { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .footer-links li a {
      color: var(--text2); text-decoration: none; font-size: 13px;
      transition: color 0.15s;
      display: flex; align-items: center; gap: 6px;
